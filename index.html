<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f4efe6" />
  <meta name="description" content="Sake Journey — the companion app for Kana - Sake Journey's sake tasting events. Remember every pour." />
  <title>Sake Journey</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./assets/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Sake Journey" />

  <!-- Brand fonts: Bodoni Moda (editorial serif) + Open Sans, matching sake-journey.com.
       Robust serif/sans fallbacks keep it beautiful offline. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,600;0,6..96,700;1,6..96,400;1,6..96,500&family=Shippori+Mincho:wght@400;500;600&family=Open+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div id="app"></div>
  <div id="sheet-root"></div>
  <div id="toast-root" role="status" aria-live="polite"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
